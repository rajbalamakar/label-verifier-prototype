version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: labelcheck
      POSTGRES_USER: ttb
      POSTGRES_PASSWORD: ttbpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttb -d labelcheck"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ttb:ttbpass@db:5432/labelcheck
      DEV_MODE: "true"
      DEV_USER_EMAIL: agent@ttb.gov
      SECRET_KEY: local-dev-secret-change-in-prod
      STORAGE_BACKEND: local
      UPLOAD_DIR: /uploads
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
